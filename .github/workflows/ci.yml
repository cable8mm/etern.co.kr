name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # 🟢 Node.js 22 버전 지정 완료
          cache: 'npm' # ⚡ 빌드 속도를 획기적으로 줄여주는 캐싱

      - name: Install Dependencies
        run: npm ci # package-lock.json 기반의 깨끗한 설치

      # 1단계: Lint & Format 검사
      - name: Check Code Quality & Formatting
        run: |
          npm run lint
          npx prettier --check .

      # 2단계: Run Tests (Vitest 연동)
      - name: Run Unit Tests
        run: npm run test

      # 3단계: Build Test
      # React(Vite)는 정적 빌드가 성공하면 문법과 타입 에러가 없다는 완벽한 방증입니다.
      - name: Run Build Test
        run: npm run build

      # 4단계: Update Changelog (필요 시 기존 액션 추가)
      # push나 특정 조건일 때 작동하도록 기존에 쓰시던 changelog 액션을 이 아래에 붙이시면 됩니다.
